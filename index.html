<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業簡介 | 阮黃秋賢</title>
    <style>
        /* 基礎設定：還原 LinkedIn 經典灰底與字體 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f2ef;
            color: rgba(0, 0, 0, 0.9);
            margin: 0;
            padding: 20px 0;
            line-height: 1.5;
        }

        .container {
            max-width: 784px; /* LinkedIn 標準置中寬度 */
            margin: 0 auto;
            padding: 0 16px;
        }

        /* 卡片共用樣式 */
        .card {
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #dadce0;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .card-content {
            padding: 24px;
        }

        /* 第一張卡片：封面與個人基本資料 */
        .banner {
            width: 100%;
            height: 200px;
            background-color: #a0b4b7;
            /* 建議替換為您的專業背景圖 */
            background-image: url('https://i.pinimg.com/736x/44/c2/f5/44c2f568e01db0082ad9e16752611bd3.jpg');
            background-size: cover;
            background-position: center;
        }

        .profile-section {
            padding: 0 24px 24px 24px;
            position: relative;
        }

        .profile-pic {
            width: 152px;
            height: 152px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1); /* 增加邊緣立體感 */
            object-fit: cover;
            position: relative;
            margin-top: -112px; /* 經典 LinkedIn 左側重疊排版 */
            background-color: #ffffff;
            display: block;
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            margin: 16px 0 4px 0;
            color: rgba(0, 0, 0, 0.9);
        }

        .headline {
            font-size: 16px;
            margin: 0 0 8px 0;
            color: rgba(0, 0, 0, 0.9);
        }

        .location {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.6);
            margin-bottom: 16px;
        }

        /* 區塊標題 */
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: rgba(0, 0, 0, 0.9);
        }

        /* 經歷與教育列表 */
        .list-item {
            display: flex;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #ebebeb;
        }

        .list-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        /* 模擬公司 Logo 區塊 */
        .logo-placeholder {
            width: 48px;
            height: 48px;
            background-color: #f3f2ef;
            margin-right: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
        }

        .item-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 2px 0;
        }

        .item-details .company {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.9);
            margin: 0 0 4px 0;
        }

        .item-details .date {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.6);
            margin: 0 0 8px 0;
        }

        .item-details .description {
            font-size: 14px;
            margin: 0;
            color: rgba(0, 0, 0, 0.9);
        }

        /* 技能區塊 */
        .skill-item {
            font-size: 15px;
            font-weight: 600;
            padding: 12px 0;
            border-bottom: 1px solid #ebebeb;
        }
        
        .skill-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="banner"></div>
        <div class="profile-section">
            <img src="您的個人相片路徑.jpg" alt="您的相片" class="profile-pic" onerror="this.src='https://i.pinimg.com/736x/e9/61/b1/e961b1d691a15deec895871d33809b78.jpg';">
            
            <h1 class="name">阮黃秋賢</h1>
            <p class="headline">外籍生 | 二年級</p>
            <p class="location">台灣，新北市 • <a href="mailto:your.email@example.com" style="color: #0a66c2; text-decoration: none; font-weight: 600;">聯絡資訊</a></p>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <h2>關於</h2>
            <p style="font-size: 14px; margin: 0;">嗨嗨~!大家好，我叫秋賢，暱稱是小天。目前在台灣留學。我喜歡畫畫，玩娃娃機，也蠻喜歡開盲盒。</p>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <h2>經歷</h2>
            
            <div class="list-item">
                <div class="logo-placeholder">公司</div>
                <div class="item-details">
                    <h3>實習生</h3>
                    <p class="company">GARMIN · 全職</p>
                    <p class="date">2024年 12月 – 至今</p>
                    <p class="description">翻譯SOP-量產製程部</p>
                </div>
            </div>

            <div class="list-item">
                <div class="logo-placeholder">前司</div>
                <div class="item-details">
                    <h3>上一份工作的職位</h3>
                    <p class="company">上一家公司名稱</p>
                    <p class="date">2020年 6月 – 2022年 12月</p>
                    <p class="description">負責跨部門溝通與專案時程控管，成功帶領 5 人團隊完成核心產品發布。</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <h2>教育背景</h2>
            
            <div class="list-item">
                <div class="logo-placeholder">大學</div>
                <div class="item-details">
                    <h3>黎明技術學院</h3>
                    <p class="company">科系名稱, 學位 (例如：資訊工程學系 學士)</p>
                    <p class="date">入學年份 – 畢業年份</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <h2>技能</h2>
            <div class="skill-item">專案管理</div>
            <div class="skill-item">數據分析</div>
            <div class="skill-item">跨部門溝通</div>
        </div>
    </div>

</div>

</body>
</html>
